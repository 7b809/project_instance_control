<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>EC2 Control Panel</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

<style>
body { background: #0f172a; color: white; }
.card { border-radius: 20px; }
.btn-lg { width: 100%; margin-bottom: 10px; }
.status-box { font-size: 18px; margin-top: 15px; }
</style>
</head>

<body>

<div class="container d-flex justify-content-center align-items-center vh-100">
    <div class="card p-4 shadow-lg text-center" style="width: 350px;">
        <h3 class="mb-3">🚀 EC2 Control Panel</h3>

        <button id="startBtn" class="btn btn-success btn-lg" onclick="controlEC2('start')">
            ▶ Start Instance
        </button>

        <button id="stopBtn" class="btn btn-danger btn-lg" onclick="controlEC2('stop')">
            ⏹ Stop Instance
        </button>

        <div id="status" class="status-box text-info">
            Status: Idle
        </div>
    </div>
</div>

<script>
async function controlEC2(action) {
    const statusBox = document.getElementById("status");
    const startBtn = document.getElementById("startBtn");
    const stopBtn = document.getElementById("stopBtn");

    // Disable buttons
    startBtn.disabled = true;
    stopBtn.disabled = true;

    statusBox.innerText = "⏳ Processing " + action + "...";

    try {
        const res = await fetch("/api/control", {
            method: "POST",
            headers: {
                "Content-Type": "application/json"
            },
            body: JSON.stringify({ action })
        });

        const data = await res.json();

        if (!res.ok) {
            statusBox.innerText = "❌ Error: " + (data.error || "Request failed");
        } else {
            statusBox.innerText = "✅ Success: " + (data.message || JSON.stringify(data));
        }

    } catch (err) {
        statusBox.innerText = "❌ Error: " + err.message;
    }

    // Re-enable buttons
    startBtn.disabled = false;
    stopBtn.disabled = false;
}
</script>

</body>
</html>
